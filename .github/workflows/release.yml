name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Build scripts require PowerShell 7.6+; install the latest stable as a
      # dotnet global tool in case the runner image ships an older pwsh.
      - name: Install PowerShell 7.6+ (dotnet tool)
        shell: pwsh
        run: dotnet tool install --global PowerShell

      - name: Build Dual Release
        shell: pwsh
        run: |
          $pwsh76 = Join-Path $env:USERPROFILE '.dotnet\tools\pwsh.exe'
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          & $pwsh76 -NoProfile -File ./build/Build-DualRelease.ps1 -Version $version -OutputDir dist

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/Win-Debloat7.exe
            dist/Win-Debloat7-Extras.exe
            dist/SHA256SUMS.txt
          body_path: dist/RELEASE_NOTES.md
          draft: false
          prerelease: false
