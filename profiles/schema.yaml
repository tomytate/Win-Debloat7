# Win-Debloat7 Profile Schema
# Defines the structure and valid values for configuration profiles

metadata:
  name: string
  version: string
  author: string
  description: string
  target_os: [ "Windows 10", "Windows 11" ]
  min_build: integer

bloatware:
  removal_mode: [ "Conservative", "Moderate", "Aggressive", "Custom" ]
  custom_list: list<string>
  exclude_list: list<string>

privacy:
  telemetry_level: [ "Security", "Basic", "Full" ]
  disable_advertising_id: boolean
  disable_activity_history: boolean
  disable_location_tracking: boolean
  disable_copilot: boolean
  disable_recall: boolean

performance:
  power_plan: [ "Balanced", "HighPerformance", "Ultimate" ]
  visual_effects: [ "Appearance", "Performance", "Custom" ]
  disable_game_bar: boolean
  disable_background_apps: boolean

network:
  dns_servers: list<string>
  disable_ipv6: boolean

# System & QoL tweaks (v1.4). All keys are opt-in booleans; omit to skip.
# Every tweak has an Enable-*/revert counterpart for per-tweak undo.
system:
  disable_fast_startup: boolean
  prevent_auto_bitlocker: boolean
  disable_delivery_optimization: boolean
  disable_storage_sense: boolean
  no_auto_reboot_updates: boolean
  no_early_updates: boolean
  disable_sticky_keys_shortcut: boolean
  disable_share_drag_tray: boolean
  disable_find_my_device: boolean
  disable_modern_standby_networking: boolean
  disable_widgets: boolean
  hide_chat_taskbar: boolean
  disable_transparency: boolean
  disable_snap_assist: boolean
  hide_start_all_apps: boolean
  disable_suggestions: boolean
  hide_settings_home: boolean
  hide_phone_link_start: boolean
  debloat_search: boolean

software:
  package_manager: [ "Winget", "Chocolatey" ]
  install_list: list<string>
  uninstall_list: list<string>
